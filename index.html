<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <h1>Job Application Tracker</h1>
    <button id="themeToggleBtn">🌙 Dark Mode</button>
  </header>

  <!-- ===== DASHBOARD ===== -->
  <section class="dashboard" id="dashboard">
    <div class="stat-card">
      <h3>Total</h3>
      <p id="statTotal">0</p>
    </div>
    <div class="stat-card">
      <h3>Interviews</h3>
      <p id="statInterview">0</p>
    </div>
    <div class="stat-card">
      <h3>Offers</h3>
      <p id="statOffer">0</p>
    </div>
    <div class="stat-card">
      <h3>Rejected</h3>
      <p id="statRejected">0</p>
    </div>
  </section>

  <!-- ===== CONTROLS ===== -->
  <section class="controls">
    <input type="text" id="searchInput" placeholder="Search by company name..." />

    <select id="statusFilter">
      <option value="all">All Statuses</option>
      <option value="Applied">Applied</option>
      <option value="Interview">Interview</option>
      <option value="Offer">Offer</option>
      <option value="Rejected">Rejected</option>
    </select>

    <select id="sortSelect">
      <option value="none">Sort By</option>
      <option value="company">Company Name</option>
      <option value="deadline">Deadline</option>
    </select>

    <button id="addNewBtn">+ Add Application</button>
  </section>

  <!-- ===== APPLICATION LIST (filled by JS) ===== -->
  <section class="application-list" id="applicationList"></section>

  <!-- ===== MODAL FORM (Add / Edit) ===== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <h2 id="modalTitle">Add Application</h2>

      <form id="applicationForm">
        <input type="hidden" id="applicationId" />

        <label for="companyName">Company Name</label>
        <input type="text" id="companyName" required />

        <label for="jobRole">Job Role</label>
        <input type="text" id="jobRole" required />

        <label for="applicationStatus">Status</label>
        <select id="applicationStatus">
          <option value="Applied">Applied</option>
          <option value="Interview">Interview</option>
          <option value="Offer">Offer</option>
          <option value="Rejected">Rejected</option>
        </select>

        <label for="deadlineDate">Deadline / Next Step</label>
        <input type="date" id="deadlineDate" />

        <label for="notes">Notes</label>
        <textarea id="notes" rows="3"></textarea>

        <div class="form-buttons">
          <button type="submit" id="saveBtn">Save</button>
          <button type="button" id="cancelBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
